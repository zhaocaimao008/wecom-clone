version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wecom-clone
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "3002:3002"
    volumes:
      - ./server/uploads:/app/server/uploads
      - ./server/wecom.db:/app/server/wecom.db
      - ./server/.env:/app/server/.env:ro
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ADMIN_PORT=3002
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Nginx reverse proxy (uncomment if needed)
